<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Этажами</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ffffff;
            color: black;
            padding: 20px;
        }

        .tabs {
            display: flex;
            align-items: center;
        }

        #tabContainer {
            display: flex;
        }

        .tab {
            margin-right: 15px;
            padding: 10px;
            border: 1px solid transparent;
            border-radius: 5px;
            cursor: pointer;
        }

        .tab.active {
            background-color: gray;
            color: white;
        }

        .tab a {
            text-decoration: none;
            color: black;
        }

        .button-container {
            margin-left: auto;
        }

        #createFloorBtn {
            margin-left: 10px;
        }

        h2 {
            display: block;
            font-size: 1.5em;
            margin-block-start: 0.83em;
            margin-block-end: 0.83em;
            margin-inline-start: 0px;
            margin-inline-end: 0px;
            font-weight: bold;
            unicode-bidi: isolate;
        }

        .btn-custom {
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
        }

        .notification {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .notification.error {
            background-color: #dc3545;
        }

        .notification.success {
            background-color: #28a745;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 400px;
            border-radius: 8px;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            color: #aaa;
            font-size: 20px;
        }

        .close:hover {
            color: #000;
        }

        .edit-icon,
        .delete-icon {
            color: #007bff;
            margin-left: 10px;
            cursor: pointer;
        }

        .combine-floor-btn {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .floor-list-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .floor-list-modal .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 500px;
        }

        .floor-list {
            list-style: none;
            padding: 0;
        }

        .floor-list li {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f8f9fa;
            cursor: pointer;
        }

        .floor-list li.selected {
            background-color: #007bff;
            color: white;
        }

        .close-modal {
            cursor: pointer;
            font-size: 24px;
            color: #aaa;
            position: absolute;
            top: 10px;
            right: 15px;
        }

        .close-modal:hover {
            color: black;
        }
    </style>
</head>
<body>
    <div class="header">
        <div id="notification" class="notification"></div>
        <div class="tabs">
            <div id="tabContainer">
                <div class="tab"><a href="index.html">Korrused</a></div>
                <div class="tab"><a href="screens.html">Ekraanid</a></div>
                <div class="tab active"><a href="floor_pluss.html">Jaagatud ekraanid</a></div>
            </div>
        </div>
        <div class="button-container">
            <button id="combineFloorsBtn" class="btn btn-custom ml-2 combine-floor-btn">Lisa korrus</button>
            <button id="logoutBtn" class="btn btn-custom ml-2" style="background-color: #007bff;">Logi välja</button>
        </div>
    </div>

    <div id="floorListModal" class="floor-list-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Valige põrandad, mida ühendada</h2>
            <ul class="floor-list" id="floorList">
                <!-- Этажи будут динамически добавлены здесь -->
            </ul>
            <input type="text" id="combinedFloorName" placeholder="Название нового этажа" class="form-control mb-3">
            <button id="confirmCombineBtn" class="btn btn-custom">Ühendama</button>
        </div>
    </div>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.location.href = 'login.html'; // Перенаправление на страницу входа
        });

        document.getElementById('combineFloorsBtn').addEventListener('click', () => {
            document.getElementById('floorListModal').style.display = 'flex';
        });

        document.querySelector('.close-modal').addEventListener('click', () => {
            document.getElementById('floorListModal').style.display = 'none';
        });

        // Функция для отображения уведомлений
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.classList.remove('bg-success', 'bg-danger');
            notification.classList.add(type === 'success' ? 'bg-success' : 'bg-danger');
            notification.textContent = message;
            notification.style.display = 'block';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        document.getElementById('confirmCombineBtn').addEventListener('click', () => {
            const selectedFloors = [...document.querySelectorAll('.floor-list li.selected')].map(li => li.dataset.floorId);
            const combinedFloorName = document.getElementById('combinedFloorName').value;

            if (selectedFloors.length > 0 && combinedFloorName) {
                const floorNumbers = selectedFloors.map(floorId => {
                    const floorNumber = parseInt(floorId, 10);
                    return floorNumber;
                });

                fetch('/api/floorGroups/combine', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        selectedFloors: floorNumbers,
                        combinedFloorName: combinedFloorName,
                    }),
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showNotification('Этажи успешно объединены!', 'success');
                        document.getElementById('floorListModal').style.display = 'none';
                    } else {
                        showNotification('Ошибка при объединении этажей: ' + data.message, 'error');
                    }
                })
                .catch(error => {
                    console.error('Ошибка при отправке запроса:', error);
                    showNotification('Произошла ошибка при объединении этажей.', 'error');
                });
            } else {
                showNotification('Пожалуйста, выберите этажи и введите название нового этажа.', 'error');
            }
        });

        function fetchFloors() {
            fetch('/api/floors')
                .then(response => response.json())
                .then(data => {
                    const floorList = document.getElementById('floorList');
                    floorList.innerHTML = ''; // Очищаем текущий список

                    if (!data || data.length === 0) {
                        alert("Ошибка: этажи не загружены или пустой ответ с сервера.");
                        return;
                    }

                    // Перебираем этажи и создаем элементы списка
                    data.forEach(floor => {
                        const li = document.createElement('li');
                        li.textContent = `${floor.floorNumber} - ${floor.floorName}`;
                        li.dataset.floorId = floor.id;
                        li.addEventListener('click', () => {
                            li.classList.toggle('selected');
                        });
                        floorList.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error('Ошибка при загрузке этажей:', error);
                    alert('Ошибка при загрузке этажей.');
                });
        }

        document.addEventListener('DOMContentLoaded', fetchFloors); // Загружаем этажи при загрузке страницы
    </script>
</body>
</html>
