<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ffffff;
            color: black;
            padding: 20px;
        }

        .wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .tabs {
            display: flex;
            align-items: center;
        }

        #tabContainer {
            display: flex;
        }

        .tab {
            margin-right: 15px;
            padding: 10px;
            border: 1px solid transparent;
            border-radius: 5px;
            cursor: pointer;
        }

        .tab.active {
            background-color: gray;
            color: black;
        }

        .tab a {
            text-decoration: none;
            color: black;
        }

        .button-container {
            margin-left: auto;
        }

        .btn-custom {
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
        }

        .logout-btn {
            background-color: #007bff;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
            margin: 0;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            font-size: 28px;
            font-weight: 600;
        }

        .input-container {
            position: relative;
            margin: 15px 0;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #newPassword {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: transparent;
            border: none;
            outline: none;
            box-shadow: none;
            padding: 0;
            margin: 0;
            width: 24px;
            height: 24px;
            font-size: 20px;
            line-height: 1;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password i {
            pointer-events: none;
        }

        .toggle-password:focus,
        .toggle-password:active,
        .toggle-password:hover {
            border: none;
            outline: none;
            box-shadow: none;
            background: transparent;
        }

        .notification {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .notification.error {
            background-color: #dc3545;
        }

        .notification.success {
            background-color: #28a745;
        }

        .create-btn {
            width: 100%;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="tabs">
            <div id="tabContainer">
                <div class="tab"><a href="index.html">Korrused</a></div>
                <div class="tab"><a href="screens.html">Ekraanid</a></div>
                <div class="tab active">Admin</div>
            </div>
        </div>

        <div class="button-container">
            <button id="logoutBtn" class="btn btn-custom logout-btn ml-2">Logi välja</button>
        </div>
    </div>

    <div class="wrapper">
        <form class="container hidden" id="adminContainer">
            <h1>Lisa kasutaja</h1>

            <div class="input-container">
                <input type="text" id="newUsername" placeholder="Login" required>
            </div>

            <div class="input-container">
                <input type="email" id="newEmail" placeholder="E-mail" required>
            </div>

            <div class="input-container">
                <input type="password" id="newPassword" placeholder="Parool" required>
                <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">
                    <i class="bi bi-eye-slash"></i>
                </button>
            </div>

            <div class="input-container">
                <select id="newRole">
                    <option value="user">Kasutaja</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button type="submit" id="createUserBtn" class="btn-custom create-btn">Loo kasutaja</button>
        </form>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        function validateInput(input) {
            input.value = input.value.replace(/[^a-zA-Z0-9]/g, '');
        }

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const type = input.type === 'password' ? 'text' : 'password';

            input.type = type;
            button.innerHTML =
                type === 'password'
                    ? '<i class="bi bi-eye-slash"></i>'
                    : '<i class="bi bi-eye"></i>';
        }

        document.getElementById('newUsername').addEventListener('input', function () {
            validateInput(this);
        });

        async function checkAdminAccess() {
            try {
                const response = await fetch('/api/users/me');
                const data = await response.json().catch(() => ({}));

                if (!response.ok || !data.user || data.user.role !== 'admin') {
                    window.location.href = 'login.html';
                    return;
                }

                document.getElementById('adminContainer').classList.remove('hidden');
            } catch (error) {
                window.location.href = 'login.html';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await fetch('/api/users/logout', {
                    method: 'POST'
                });
            } catch (error) {
                console.error('Viga väljalogimisel:', error);
            }

            window.location.href = 'login.html';
        });

        document.getElementById('adminContainer').addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = document.getElementById('newUsername').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;

            if (!username || !email || !password) {
                showNotification('Kasutajanimi, email ja parool on vajalikud!', 'error');
                return;
            }

            try {
                const response = await fetch('/api/users/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, role }),
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(data.message || 'Kasutaja loomine ebaõnnestus');
                }

                showNotification('Kasutaja loodud!', 'success');
                document.getElementById('newUsername').value = '';
                document.getElementById('newEmail').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('newRole').value = 'user';
            } catch (error) {
                showNotification(error.message, 'error');
                console.error('Viga kasutaja loomisel:', error);
            }
        });

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';

            setTimeout(() => {
                notification.style.display = 'none';
                notification.className = 'notification';
                notification.textContent = '';
            }, 3000);
        }

        checkAdminAccess();
    </script>
</body>
</html>
