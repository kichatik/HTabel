<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korruste haldamine</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
        }

        .header {
            display: flex;
            align-items: center; 
            justify-content: space-between; 
            background-color: #ffffff; 
            color: black; 
            padding: 20px; 
        }

        .tabs {
            display: flex; 
            align-items: center; 
        }

        #tabContainer {
            display: flex; 
        }

        .tab {
            margin-right: 15px; 
            padding: 10px; 
            border: 1px solid transparent; 
            border-radius: 5px; 
            cursor: pointer; 
        }

        .tab.active {
            background-color: gray; 
            color: black; 
        }

        .tab a {
            text-decoration: none; 
            color: black; 
        }

        .button-container {
            margin-left: auto; 
        }

        .btn-custom {
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
        }

        .container {
            background: transparent;
            padding: 20px 0 0;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .notification {
            display: none; 
            position: fixed; 
            top: 20px; 
            left: 50%;
            transform: translateX(-50%); 
            color: white; 
            padding: 15px;
            border-radius: 5px; 
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .notification.error { 
            background-color: #dc3545; 
        }

        .notification.success { 
            background-color: #28a745; 
        }

        .modal {
            display: none; position: fixed; z-index: 1;
            left: 0; top: 0; width: 100%; height: 100%;
            overflow: auto; background-color: rgba(0, 0, 0, 0.5);
        }
        .modal-content {
            position: relative;
            background-color: white; margin: 15% auto; padding: 20px;
            border: 1px solid #888; width: 400px; border-radius: 8px;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            color: #aaa;
            font-size: 20px;
        }

        .close:hover {
            color: #000;
        }

        .logout-btn {
            background-color: #007bff;
        }

        .doctor-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .doctor-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .slots {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .slot {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            border: none;
            cursor: pointer;
        }

        .slot.free {
            background: #28a745;
            color: white;
        }

        .slot.busy {
            background: #dc3545;
            color: white;
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="tabs">
            <div id="tabContainer">
                <div class="tab"><a href="user.html">Broneerimine</a></div>
                <div class="tab active">Ajakava</div>
            </div>
        </div>
        <div class="button-container">
            <button id="logoutBtn" class="btn btn-custom logout-btn ml-2">Logi välja</button>
        </div>
    </div>

    <div class="container mt-3">
        <input type="date" id="datePicker" class="form-control mb-3">
        <div id="scheduleContainer"></div>
    </div>

    <div id="notification" class="notification"></div>

<script>
    const times = [
        '09:00','09:30','10:00','10:30','11:00','11:30',
        '12:00','12:30','13:00','13:30','14:00','14:30',
        '15:00','15:30','16:00'
    ];

    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').value = today;
        loadSchedule();
    });

    document.getElementById('datePicker').addEventListener('change', loadSchedule);

    async function loadSchedule() {
        const date = document.getElementById('datePicker').value;

        const res = await fetch(`/api/schedule?date=${date}`);
        const data = await res.json();

        const container = document.getElementById('scheduleContainer');
        container.innerHTML = '';

        data.forEach(doc => {
            const card = document.createElement('div');
            card.className = 'doctor-card';

            card.innerHTML = `
                <div class="doctor-name">
                    👨‍⚕️ ${doc.employee.firstName}
                </div>

                <div class="slots">
                    ${doc.slots.map(s => `
                        <button
                            class="slot ${s.status}"
                            ${s.status === 'busy' ? 'disabled' : ''}
                            onclick="book(${doc.employee.id}, '${s.time}', '${date}')"
                        >
                            ${s.time}
                        </button>
                    `).join('')}
                </div>
            `;

            container.appendChild(card);
        });
    }

    async function book(employeeId, time, date) {
        return; // ничего не делаем при клике
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        try {
            await fetch('/api/users/logout', {
                method: 'POST'
            });
        } catch (error) {
            console.error('Viga väljalogimisel:', error);
        }

        window.location.href = 'login.html';
    });

    function showNotification(message, type) {
        const notification = document.getElementById('notification');

        notification.textContent = message;
        notification.className = 'notification ' + type;
        notification.style.display = 'block';

        setTimeout(() => {
            notification.style.display = 'none';
        }, 3000);
    }
</script>
</body>
</html>
