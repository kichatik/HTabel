<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korruste haldamine</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ffffff;
            padding: 20px;
        }

        .tabs { display: flex; align-items: center; }

        #tabContainer { display: flex; }

        .tab {
            margin-right: 15px;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .tab.active { background: gray; }

        .tab a { text-decoration: none; color: black; }

        .button-container { margin-left: auto; }

        .btn-custom {
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .doctor-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .doctor-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .slots {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .slot {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .slot.free {
            background: #28a745;
            color: white;
        }

        .slot.busy {
            background: #dc3545;
            color: white;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            margin: 15% auto;
            padding: 20px;
            width: 400px;
            border-radius: 8px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            font-size: 20px;
        }

        .notification {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 6px;
            color: white;
        }

        .notification.success { background: #28a745; }
        .notification.error { background: #dc3545; }
    </style>
</head>

<body>

<div class="header">
    <div class="tabs">
        <div id="tabContainer">
            <div class="tab"><a href="user.html">Broneerimine</a></div>
            <div class="tab active">Ajakava</div>
        </div>
    </div>

    <div class="button-container">
        <button id="logoutBtn" class="btn btn-custom">Logi välja</button>
    </div>
</div>

<div class="container">
    <input type="date" id="datePicker" class="form-control mb-3">
    <div id="scheduleContainer"></div>
</div>

<div id="notification" class="notification"></div>

<!-- MODAL -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close" id="modalClose">&times;</span>

        <h5>Broneeri aeg</h5>
        <p id="modalDoctor"></p>
        <p id="modalTime"></p>

        <input type="text" id="patientName" class="form-control" placeholder="Patsiendi nimi">

        <button id="confirmBooking" class="btn btn-primary mt-3">Broneeri</button>
    </div>
</div>

<script>
const times = [
    '09:00','09:30','10:00','10:30','11:00','11:30',
    '12:00','12:30','13:00','13:30','14:00','14:30',
    '15:00','15:30','16:00'
];

let selectedBooking = null;

const modal = document.getElementById('bookingModal');
const modalDoctor = document.getElementById('modalDoctor');
const modalTime = document.getElementById('modalTime');
const patientNameInput = document.getElementById('patientName');

document.addEventListener('DOMContentLoaded', () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('datePicker').value = today;
    loadSchedule();
});

document.getElementById('datePicker').addEventListener('change', loadSchedule);

// ===== LOAD SCHEDULE =====
async function loadSchedule() {
    const date = document.getElementById('datePicker').value;

    const res = await fetch(`/api/schedule?date=${date}`);
    const data = await res.json();

    const container = document.getElementById('scheduleContainer');
    container.innerHTML = '';

    data.forEach(doc => {
        const card = document.createElement('div');
        card.className = 'doctor-card';

        card.innerHTML = `
            <div class="doctor-name">👨‍⚕️ ${doc.employee.firstName}</div>

            <div class="slots">
                ${doc.slots.map(s => `
                    <button
                        class="slot ${s.status}"
                        ${s.status === 'busy' ? 'disabled' : ''}
                        data-employee="${doc.employee.id}"
                        data-time="${s.time}"
                        data-date="${date}"
                        data-doctor="${doc.employee.firstName}"
                    >
                        ${s.time}
                    </button>
                `).join('')}
            </div>
        `;

        container.appendChild(card);
    });
}

// ===== CLICK ON SLOT =====
document.addEventListener('click', (e) => {
    if (!e.target.classList.contains('slot')) return;
    if (e.target.classList.contains('busy')) return;

    const employeeId = e.target.dataset.employee;
    const time = e.target.dataset.time;
    const date = e.target.dataset.date;
    const doctorName = e.target.dataset.doctor;

    selectedBooking = { employeeId, time, date };

    modalDoctor.textContent = `Arst: ${doctorName}`;
    modalTime.textContent = `Aeg: ${time} ${date}`;

    patientNameInput.value = '';
    modal.style.display = 'block';
});

// ===== CONFIRM BOOKING =====
document.getElementById('confirmBooking').addEventListener('click', async () => {
    const patientName = patientNameInput.value.trim();

    if (!selectedBooking) return;

    const res = await fetch('/api/appointments', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            employee_id: selectedBooking.employeeId,
            appointment_date: selectedBooking.date,
            appointment_time: selectedBooking.time,
            patient_name: patientName
        })
    });

    const data = await res.json();

    if (!res.ok) {
        showNotification(data.message || 'Error', 'error');
        return;
    }

    showNotification('Broneering tehtud!', 'success');
    modal.style.display = 'none';
    loadSchedule();
});

// ===== CLOSE MODAL =====
document.getElementById('modalClose').onclick = () => modal.style.display = 'none';

window.onclick = (e) => {
    if (e.target === modal) modal.style.display = 'none';
};

// ===== LOGOUT =====
document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/users/logout', { method: 'POST' });
    window.location.href = 'login.html';
});

// ===== NOTIFICATION =====
function showNotification(message, type) {
    const n = document.getElementById('notification');
    n.textContent = message;
    n.className = 'notification ' + type;
    n.style.display = 'block';

    setTimeout(() => n.style.display = 'none', 3000);
}
</script>

</body>
</html>
