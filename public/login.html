<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisselogimine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <style>
        * { 
            box-sizing: border-box; 
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white; 
            padding: 25px; 
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); 
            width: 400px;
        }

        h1 { 
            text-align: center; 
        }

        .input-container {
            position: relative; 
            margin: 15px 0;
        }

        input {
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .toggle-password {
            position: absolute; 
            right: 10px; 
            top: 50%;
            transform: translateY(-50%); 
            cursor: pointer;
            background: none; 
            border: none; 
            font-size: 20px;
            color: black;
        }

        .button-container {
            display: flex; 
            justify-content: space-between; 
            margin-top: 40px;
        }

        .btn {
            padding: 10px 15px; 
            border: none; 
            border-radius: 4px;
            cursor: pointer; 
            color: white;
        }

        .login-btn {
            background-color: #28a745;
            border-radius: 8px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #888;
        }

        .notification {
            display: none; 
            position: fixed; 
            top: 20px; 
            left: 50%;
            transform: translateX(-50%); 
            color: white; 
            padding: 15px;
            border-radius: 5px; 
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .notification.error { 
            background-color: #dc3545; 
        }

        .notification.success { 
            background-color: #28a745; 
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="container">
            <div class="logo">
                <img src="/img/logo.png" alt="Logo" style="width:80px;">
            </div>

            <h1>Sisselogimine</h1>

            <form id="loginForm">
                <div class="input-container">
                    <input type="text" id="username" placeholder="Login" required oninput="validateInput(this)">
                </div>

                <div class="input-container">
                    <input type="password" id="password" placeholder="Parool" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn login-btn">Logi sisse</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        © 2026 Meditsiinisüsteem | Kontakt: info@example.com
    </footer>

    <div id="notification" class="notification"></div>

    <script>
        // Валидация ввода, чтобы разрешить только алфавитные символы и цифры
        function validateInput(input) {
            input.value = input.value.replace(/[^a-zA-Z0-9]/g, '');
        }

        // Переключение видимости пароля
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');

            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';

            icon.className = isHidden
                ? 'bi bi-eye'
                : 'bi bi-eye-slash';
        }

        // Обработка отправки формы входа
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Vale kasutajanimi või parool');
                }

                showNotification(data.message || 'Sisselogimine õnnestus!', 'success');

                setTimeout(() => {
                    if (data.user.role === 'admin') {
                        window.location.href = 'index.html';
                    } else {
                        window.location.href = 'user.html';
                    }
                }, 800);
            } catch (error) {
                showNotification(error.message, 'error');
            }
        });

        // Показ уведомлений
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';

            setTimeout(() => {
                notification.style.display = 'none';
                notification.className = 'notification';
                notification.textContent = '';
            }, 3000);
        }
    </script>
</body>
</html>
