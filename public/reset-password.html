<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parooli taastamine</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 420px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .icon {
            font-size: 40px;
            color: #0d6efd;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .input-container {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0d6efd;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0b5ed7;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 18px;
            border-radius: 8px;
            color: white;
            display: none;
            font-size: 14px;
        }

        .success { background: #28a745; }
        .error { background: #dc3545; }

        .small {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="icon">
        <i class="bi bi-lock"></i>
    </div>

    <h2>Uue parooli seadistamine</h2>
    <p>Sisesta uus parool oma konto jaoks</p>

    <div class="input-container">
        <input id="newPassword" type="password" placeholder="Uus parool">
    </div>

    <button onclick="resetPassword()">Muuda parool</button>

    <div class="small">Parool peab olema vähemalt 6 tähemärki</div>
</div>

<div id="notification" class="notification"></div>

<script>
    const token = new URLSearchParams(window.location.search).get('token');

    async function resetPassword() {
        const password = document.getElementById('newPassword').value;

        if (!password || password.length < 6) {
            showNotification('Parool peab olema vähemalt 6 tähemärki', 'error');
            return;
        }

        try {
            const res = await fetch('/api/users/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    token,
                    password
                })
            });

            const data = await res.json();

            if (!res.ok) {
                showNotification(data.message || 'Viga', 'error');
                return;
            }

            showNotification('Parool edukalt muudetud!', 'success');

            setTimeout(() => {
                window.location.href = '/login.html';
            }, 1500);

        } catch (err) {
            showNotification('Serveri viga', 'error');
        }
    }

    function showNotification(message, type) {
        const el = document.getElementById('notification');
        el.textContent = message;
        el.className = `notification ${type}`;
        el.style.display = 'block';

        setTimeout(() => {
            el.style.display = 'none';
        }, 3000);
    }
</script>

</body>
</html>
